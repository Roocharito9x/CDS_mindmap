<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BIDV Jigsaw Puzzle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100vw;height:100vh;height:100dvh;overflow:hidden;background:#003d1e;font-family:Arial,sans-serif;user-select:none}

/* ── Portrait guard ── */
#guard{display:none;position:fixed;inset:0;z-index:9999;background:#003d1e;
  flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:14px;text-align:center}
@media(orientation:portrait){#guard{display:flex}}
.spin{font-size:3rem;animation:rot 2s ease-in-out infinite}
@keyframes rot{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}

/* ── Start screen ── */
#start{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:linear-gradient(135deg,#003d1e 0%,#006633 55%,#003d1e 100%);gap:0;
  padding:env(safe-area-inset-top,0px) env(safe-area-inset-right,0px) env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px)}

.stitle{color:rgba(255,255,255,.92);font-size:clamp(.85rem,2vw,1.1rem);
  letter-spacing:3px;font-weight:700;margin-bottom:16px}

/* Upload zone */
#upload-zone{
  width:min(360px,52vw); aspect-ratio:4/3;
  border:2.5px dashed rgba(255,255,255,.38);
  border-radius:16px;cursor:pointer;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.06);
  transition:border-color .2s,transform .1s,background .2s;
  position:relative;
}
#upload-zone:hover,#upload-zone.drag{border-color:#FFB800;background:rgba(255,184,0,.1)}
#upload-zone:active{transform:scale(.97)}
#upload-ph{display:flex;flex-direction:column;align-items:center;gap:8px;
  color:#fff;pointer-events:none}
#upload-ph .icon{font-size:2.8rem}
#upload-ph .label{font-size:clamp(.85rem,2vw,1rem);font-weight:600}
#upload-ph .hint{font-size:.75rem;opacity:.5}
#prev-cv{width:100%;height:100%;display:none;object-fit:contain;background:#fff}
.change-hint{position:absolute;bottom:8px;right:10px;font-size:.7rem;
  color:rgba(255,255,255,.55);background:rgba(0,0,0,.4);
  padding:3px 8px;border-radius:20px;display:none}

.ssub{color:rgba(255,255,255,.42);font-size:clamp(.7rem,1.5vw,.85rem);margin:12px 0 22px}

/* Buttons */
.btn{padding:13px 44px;font-size:clamp(.95rem,2.4vw,1.25rem);font-weight:700;border:none;
  border-radius:50px;cursor:pointer;letter-spacing:1px;transition:transform .1s,opacity .2s}
.btn:active{transform:scale(.95)}
.btn-gold{background:linear-gradient(135deg,#FFB800,#FF9500);color:#003d1e;
  box-shadow:0 4px 22px rgba(255,153,0,.5)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* ── Mode selector ── */
.mode-row{display:flex;gap:10px;margin:10px 0 18px}
.mode-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 22px;border:2px solid rgba(255,255,255,.25);
  border-radius:14px;background:rgba(255,255,255,.06);
  color:#fff;cursor:pointer;transition:all .18s;min-width:clamp(110px,14vw,150px);
  font-family:inherit;
}
.mode-btn:hover{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.12)}
.mode-btn.sel{border-color:#FFB800;background:rgba(255,184,0,.18);
  box-shadow:0 0 14px rgba(255,184,0,.3)}
.mode-btn:active{transform:scale(.95)}
.mode-icon{font-size:1.5rem}
.mode-name{font-weight:700;font-size:clamp(.8rem,1.8vw,.95rem);letter-spacing:.5px}
.mode-desc{font-size:clamp(.6rem,1.2vw,.72rem);opacity:.55;text-align:center;line-height:1.3}

/* ── Game screen ── */
#game{position:fixed;inset:0;display:none;flex-direction:column;background:#002510}
#game.on{display:flex}
#hud{height:50px;background:rgba(0,0,0,.5);display:flex;align-items:center;
  justify-content:space-between;
  padding:0 max(18px,env(safe-area-inset-right,0px)) 0 max(18px,env(safe-area-inset-left,0px));
  flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.1)}
#timer{font-size:1.75rem;font-weight:700;color:#FFB800;font-variant-numeric:tabular-nums;
  letter-spacing:2px;min-width:76px}
#timer.red{color:#ff3b30;animation:blink .5s infinite alternate}
@keyframes blink{to{opacity:.35}}
#hudtitle{color:#fff;font-weight:700;font-size:clamp(.85rem,2vw,1rem)}
#prog{color:rgba(255,255,255,.65);font-size:.92rem;min-width:72px;text-align:right}
#cv{flex:1;display:block;touch-action:none}
#hint-btn{padding:5px 14px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.3);
  border-radius:20px;color:rgba(255,255,255,.75);font-size:.78rem;font-weight:600;cursor:pointer;
  transition:all .15s;font-family:inherit;white-space:nowrap}
#hint-btn.on{background:rgba(255,184,0,.25);border-color:#FFB800;color:#FFB800}
#hint-btn:active{transform:scale(.93)}

/* ── Overlays ── */
.ov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.78);backdrop-filter:blur(7px)}
.ov.hide{display:none}
.card{background:#fff;border-radius:22px;padding:clamp(22px,4vw,46px) clamp(30px,6vw,68px);
  text-align:center;box-shadow:0 20px 70px rgba(0,0,0,.55);max-width:88vw}
.card .em{font-size:2.8rem;margin-bottom:6px}
.card h1{font-size:clamp(1.5rem,4vw,2.3rem);color:#003d1e;margin-bottom:6px}
.card p{font-size:clamp(.85rem,1.8vw,1.05rem);color:#555;margin-bottom:4px}
.card .tdisp{font-size:clamp(1.3rem,3vw,1.9rem);font-weight:700;color:#006633;margin:10px 0 22px}
</style>
</head>
<body>

<!-- Portrait guard -->
<div id="guard">
  <div class="spin">📱</div>
  <div style="font-size:1.25rem;font-weight:700">Vui lòng xoay ngang màn hình</div>
  <div style="font-size:.85rem;opacity:.55">Please rotate to landscape</div>
</div>

<!-- Start -->
<div id="start">
  <div class="stitle">🧩 BIDV JIGSAW PUZZLE</div>

  <div id="upload-zone" onclick="triggerUpload()">
    <canvas id="prev-cv"></canvas>
    <div id="upload-ph">
      <div class="icon">📷</div>
      <div class="label">Chọn ảnh để chơi</div>
      <div class="hint">Tap để chọn từ thư viện · Kéo thả ảnh vào đây</div>
    </div>
    <div class="change-hint" id="change-hint">✎ Đổi ảnh</div>
  </div>
  <input type="file" id="file-in" accept="image/*" style="display:none" onchange="onFile(event)">

  <div class="ssub">2 người chơi &nbsp;·&nbsp; 12 mảnh &nbsp;·&nbsp; 2 phút</div>

  <!-- Mode selector -->
  <div class="mode-row">
    <button class="mode-btn sel" id="btn-out" onclick="setMode('outside')">
      <span class="mode-icon">↔️</span>
      <span class="mode-name">Kiểu 1 · Ngoài</span>
      <span class="mode-desc">Mảnh xếp hai bên<br>ngoài khung hình</span>
    </button>
    <button class="mode-btn" id="btn-in" onclick="setMode('inside')">
      <span class="mode-icon">⊞</span>
      <span class="mode-name">Kiểu 2 · Trong</span>
      <span class="mode-desc">Mảnh trộn trong<br>khung hình</span>
    </button>
  </div>

  <button class="btn btn-gold" id="start-btn" onclick="startGame()" disabled>▶&nbsp; BẮT ĐẦU</button>
</div>

<!-- Game -->
<div id="game">
  <div id="hud">
    <div id="timer">02:00</div>
    <div id="hudtitle">🧩 BIDV Jigsaw</div>
    <div style="display:flex;align-items:center;gap:12px">
      <button id="hint-btn" onclick="toggleHints()">💡 Gợi ý</button>
      <div id="prog">0 / 12</div>
    </div>
  </div>
  <canvas id="cv"></canvas>
</div>

<!-- Victory -->
<div id="ov-win" class="ov hide">
  <div class="card">
    <div class="em">🎉</div>
    <h1>Chúc Mừng!</h1>
    <p>Cả 2 người chơi đã hoàn thành puzzle!</p>
    <div class="tdisp" id="win-time"></div>
    <button class="btn btn-gold" onclick="reset()">🔄&nbsp; CHƠI LẠI</button>
  </div>
</div>

<!-- Game Over -->
<div id="ov-lose" class="ov hide">
  <div class="card">
    <div class="em">⏰</div>
    <h1 style="color:#cc2200">Hết Giờ!</h1>
    <p id="lose-msg"></p>
    <div style="margin:14px 0 22px"></div>
    <button class="btn btn-gold" onclick="reset()">🔄&nbsp; THỬ LẠI</button>
  </div>
</div>

<script>
'use strict';
// ════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════
const COLS=4, ROWS=3, N=12, SECS=120;
let snapR=40; // computed dynamically in layout()

// hEdge[r][c] right-edge of piece(c,r): +1=tab right, -1=blank
const HE=[[1,-1,1],[-1,1,-1],[1,-1,1]];
// vEdge[r][c] bottom-edge of piece(c,r): +1=tab down, -1=blank
const VE=[[-1,1,-1,1],[1,-1,1,-1]];

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let pieces=[], tMap=new Map(), tOff=new Map();
let snapped=0, tLeft=SECS, ticker=null, alive=false;
let bX=0,bY=0,pW=0,pH=0,tab=0;
let cvW=0, cvH=0; // logical canvas dimensions (CSS px)
let logo=null, uploadedImg=null, raf=null;
let gameMode='outside'; // 'outside' | 'inside'
let showHints=false;

const cv=document.getElementById('cv');
const cx=cv.getContext('2d');

// ════════════════════════════════════════════
//  IMAGE UPLOAD
// ════════════════════════════════════════════
function triggerUpload(){
  document.getElementById('file-in').click();
}

function onFile(e){
  const file=e.target.files[0];
  if(!file)return;
  processFile(file);
  e.target.value=''; // reset so same file can be picked again
}

function processFile(file){
  if(!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{ uploadedImg=img; showPreview(img); };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function showPreview(img){
  const zone=document.getElementById('upload-zone');
  const ph=document.getElementById('upload-ph');
  const pcv=document.getElementById('prev-cv');
  const hint=document.getElementById('change-hint');

  const zW=zone.clientWidth, zH=zone.clientHeight;
  pcv.width=zW*2; pcv.height=zH*2; // 2x for retina
  pcv.style.width=zW+'px'; pcv.style.height=zH+'px';

  const pctx=pcv.getContext('2d');
  // contain-fit: show full image with white letterbox
  pctx.fillStyle='#fff';
  pctx.fillRect(0,0,pcv.width,pcv.height);
  const ar=img.naturalWidth/img.naturalHeight;
  const zAr=(zW*2)/(zH*2);
  let dw=pcv.width, dh=pcv.height;
  if(ar>zAr){ dh=dw/ar; } else { dw=dh*ar; }
  pctx.drawImage(img,0,0,img.naturalWidth,img.naturalHeight,
    (pcv.width-dw)/2,(pcv.height-dh)/2,dw,dh);

  ph.style.display='none';
  pcv.style.display='block';
  hint.style.display='block';

  document.getElementById('start-btn').disabled=false;
}

// ════════════════════════════════════════════
//  HINTS TOGGLE
// ════════════════════════════════════════════
function toggleHints(){
  showHints=!showHints;
  document.getElementById('hint-btn').classList.toggle('on',showHints);
}

// ════════════════════════════════════════════
//  MODE SELECTION
// ════════════════════════════════════════════
function setMode(m){
  gameMode=m;
  document.getElementById('btn-out').classList.toggle('sel',m==='outside');
  document.getElementById('btn-in').classList.toggle('sel',m==='inside');
}

// Drag-and-drop on upload zone
const zone=document.getElementById('upload-zone');
zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag');});
zone.addEventListener('dragleave',()=>zone.classList.remove('drag'));
zone.addEventListener('drop',e=>{
  e.preventDefault(); zone.classList.remove('drag');
  const file=e.dataTransfer.files[0];
  if(file)processFile(file);
});

// ════════════════════════════════════════════
//  BUILD LOGO CANVAS FROM UPLOADED IMAGE
// ════════════════════════════════════════════
function buildLogoCanvas(targetW, targetH){
  const oc=document.createElement('canvas');
  oc.width=targetW; oc.height=targetH;
  const c=oc.getContext('2d');
  // contain-fit: full image visible, white letterbox if ratio differs
  c.fillStyle='#fff';
  c.fillRect(0,0,targetW,targetH);
  const ar=uploadedImg.naturalWidth/uploadedImg.naturalHeight;
  const tAr=targetW/targetH;
  let dw=targetW, dh=targetH;
  if(ar>tAr){ dh=dw/ar; } else { dw=dh*ar; }
  c.drawImage(uploadedImg,0,0,uploadedImg.naturalWidth,uploadedImg.naturalHeight,
    (targetW-dw)/2,(targetH-dh)/2,dw,dh);
  return oc;
}

// ════════════════════════════════════════════
//  JIGSAW PATH
// ════════════════════════════════════════════
function getEdges(c,r){
  return{
    top:   r===0     ?0:-VE[r-1][c],
    right: c===COLS-1?0: HE[r][c],
    bot:   r===ROWS-1?0: VE[r][c],
    left:  c===0     ?0:-HE[r][c-1]
  };
}

function jigPath(c2,px,py,pw,ph,e,ts){
  c2.beginPath(); c2.moveTo(px,py);
  seg(c2,px,py,px+pw,py,      e.top,  'h',ts);
  seg(c2,px+pw,py,px+pw,py+ph,e.right,'v',ts);
  seg(c2,px+pw,py+ph,px,py+ph,e.bot,  'h',ts);
  seg(c2,px,py+ph,px,py,      e.left, 'v',ts);
  c2.closePath();
}

function seg(c2,x0,y0,x1,y1,dir,axis,ts){
  if(dir===0){c2.lineTo(x1,y1);return;}
  const len=(axis==='h'?Math.abs(x1-x0):Math.abs(y1-y0));
  const mx=(x0+x1)/2, my=(y0+y1)/2;
  const nw=len*.11; // narrow neck half-width
  const hw=len*.22; // round head half-width
  const ht=ts*dir;
  if(axis==='h'){
    const sg=x1>x0?1:-1, n=-sg*ht;
    c2.lineTo(mx-sg*nw,y0);
    // left neck → shoulder
    c2.bezierCurveTo(mx-sg*nw,y0+n*.45, mx-sg*hw,y0+n*.45, mx-sg*hw,y0+n*.7);
    // circular head arc
    c2.bezierCurveTo(mx-sg*hw,y0+n*1.15, mx+sg*hw,y0+n*1.15, mx+sg*hw,y0+n*.7);
    // right shoulder → neck
    c2.bezierCurveTo(mx+sg*hw,y0+n*.45, mx+sg*nw,y0+n*.45, mx+sg*nw,y0);
  }else{
    const sg=y1>y0?1:-1, n=sg*ht;
    c2.lineTo(x0,my-sg*nw);
    c2.bezierCurveTo(x0+n*.45,my-sg*nw, x0+n*.45,my-sg*hw, x0+n*.7,my-sg*hw);
    c2.bezierCurveTo(x0+n*1.15,my-sg*hw, x0+n*1.15,my+sg*hw, x0+n*.7,my+sg*hw);
    c2.bezierCurveTo(x0+n*.45,my+sg*hw, x0+n*.45,my+sg*nw, x0,my+sg*nw);
  }
  c2.lineTo(x1,y1);
}

// ════════════════════════════════════════════
//  LAYOUT
// ════════════════════════════════════════════
function layout(){
  const dpr=window.devicePixelRatio||1;
  const W=window.innerWidth, H=window.innerHeight-50;
  cvW=W; cvH=H;
  cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  cx.setTransform(dpr,0,0,dpr,0,0);
  const bW=Math.min(W*.48, H*.82*COLS/ROWS);
  const bH=bW*ROWS/COLS;
  pW=bW/COLS; pH=bH/ROWS;
  tab=Math.min(pW,pH)*.20;
  bX=(W-bW)/2; bY=(H-bH)/2;
  snapR=Math.max(30, Math.min(56, pW*0.22)); // ~22% of piece size
}

// ════════════════════════════════════════════
//  PIECES
// ════════════════════════════════════════════
function initPieces(){
  pieces=[];
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      pieces.push({c,r,x:0,y:0,snapped:false,z:r*COLS+c});
}

function scatter(){
  const W=cvW, H=cvH;
  const bboxW=pW+tab*2, bboxH=pH+tab*2;
  const pad=16;

  // Left panel: 0..bX, Right panel: bX+boardW..W
  const boardW=COLS*pW;
  const leftEnd=bX-tab-18;          // right edge of left panel
  const rightStart=bX+boardW+tab+18; // left edge of right panel

  pieces.forEach((p,i)=>{
    const inLeft=i<Math.ceil(N/2);
    let x,y;
    if(inLeft){
      const span=Math.max(1,leftEnd-bboxW-pad);
      x=pad+Math.random()*span;
    }else{
      const span=Math.max(1,W-rightStart-bboxW-pad);
      x=rightStart+Math.random()*span;
    }
    const ySpan=Math.max(1,H-bboxH-pad*2);
    y=pad+Math.random()*ySpan;
    p.x=x; p.y=y; p.snapped=false; p.z=i;
  });
}

// Inside mode: pieces shuffled within the board, max 2 overlap per zone
function scatterInside(){
  // Build 12 base positions (one per grid cell) with random jitter
  const pos=[];
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      pos.push({
        x: bX + c*pW - tab + (Math.random()-.5)*pW*.55,
        y: bY + r*pH - tab + (Math.random()-.5)*pH*.55
      });

  // Shuffle position→piece assignment
  for(let i=pos.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pos[i],pos[j]]=[pos[j],pos[i]];
  }

  pieces.forEach((p,i)=>{
    p.x=pos[i].x; p.y=pos[i].y;
    p.snapped=false; p.z=i;
  });
}

function tgt(c,r){return{x:bX+c*pW-tab,y:bY+r*pH-tab};}

// ════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════
function render(){
  if(!alive)return;
  cx.clearRect(0,0,cvW,cvH);
  cx.fillStyle='#002510'; cx.fillRect(0,0,cvW,cvH);

  // Board outline rectangle (always visible)
  cx.save();
  cx.strokeStyle='rgba(255,255,255,.22)';
  cx.lineWidth=1.5;
  cx.strokeRect(bX,bY,COLS*pW,ROWS*pH);
  cx.restore();

  if(showHints) drawGhosts();
  [...pieces].sort((a,b)=>a.z-b.z).forEach(drawPiece);
  raf=requestAnimationFrame(render);
}

// Ghost board: faint image + border at each target position
function drawGhosts(){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const tp=tgt(c,r), e=getEdges(c,r);
    const piece=pieces.find(p=>p.c===c&&p.r===r);
    if(piece&&piece.snapped) continue; // snapped piece already covers ghost

    // Check if the matching piece is dragged close to this target
    const near=piece&&!piece.snapped&&Math.hypot(piece.x-tp.x,piece.y-tp.y)<snapR*2.2;

    // Faint image guide
    cx.save();
    jigPath(cx,tp.x+tab,tp.y+tab,pW,pH,e,tab);
    cx.clip();
    cx.globalAlpha=near?0.45:0.18;
    cx.drawImage(logo, tp.x+tab-c*pW, tp.y+tab-r*pH, pW*COLS, pH*ROWS);
    cx.globalAlpha=1;
    cx.restore();

    // Border outline
    cx.save();
    jigPath(cx,tp.x+tab,tp.y+tab,pW,pH,e,tab);
    if(near){
      cx.strokeStyle='rgba(255,210,0,.95)';
      cx.lineWidth=2.5;
      cx.shadowColor='rgba(255,200,0,.6)';
      cx.shadowBlur=10;
    }else{
      cx.strokeStyle='rgba(255,255,255,.28)';
      cx.lineWidth=1.2;
    }
    cx.stroke();
    cx.restore();
  }
}

function drawPiece(p){
  const e=getEdges(p.c,p.r);
  const px=p.x+tab, py=p.y+tab;
  const dragged=[...tMap.values()].includes(pieces.indexOf(p));

  // Clip + draw image portion
  cx.save();
  jigPath(cx,px,py,pW,pH,e,tab);
  cx.clip();
  cx.drawImage(logo, p.x+tab-p.c*pW, p.y+tab-p.r*pH, pW*COLS, pH*ROWS);
  cx.restore();

  // Drag shadow
  if(dragged){
    cx.save();
    cx.shadowColor='rgba(0,0,0,.55)'; cx.shadowBlur=20; cx.shadowOffsetY=7;
    jigPath(cx,px,py,pW,pH,e,tab);
    cx.strokeStyle='rgba(0,0,0,.01)'; cx.lineWidth=1; cx.stroke();
    cx.restore();
  }

  // Outline
  cx.save();
  jigPath(cx,px,py,pW,pH,e,tab);
  cx.strokeStyle=p.snapped?'rgba(255,210,0,.8)':dragged?'rgba(255,255,255,.95)':'rgba(0,0,0,.6)';
  cx.lineWidth=p.snapped?2.5:dragged?3:1.5;
  cx.stroke();
  cx.restore();

  // Snap flash
  if(p._flash){
    cx.save();
    jigPath(cx,px,py,pW,pH,e,tab);
    cx.fillStyle=`rgba(80,255,120,${p._flash})`;
    cx.fill();
    p._flash-=.08;
    if(p._flash<=0)delete p._flash;
    cx.restore();
  }
}

// ════════════════════════════════════════════
//  HIT TEST
// ════════════════════════════════════════════
function hit(x,y){
  const sorted=pieces.map((p,i)=>({...p,_i:i})).sort((a,b)=>b.z-a.z);
  for(const p of sorted){
    if(p.snapped)continue;
    const e=getEdges(p.c,p.r);
    cx.save();
    cx.setTransform(1,0,0,1,0,0); // identity: iOS Safari isPointInPath ignores CTM
    jigPath(cx,p.x+tab,p.y+tab,pW,pH,e,tab);
    const ok=cx.isPointInPath(x,y);
    cx.restore();
    if(ok)return p._i;
  }
  return -1;
}

// ════════════════════════════════════════════
//  TOUCH + MOUSE
// ════════════════════════════════════════════
function rc(t){const r=cv.getBoundingClientRect();return[t.clientX-r.left,t.clientY-r.top];}

cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const[x,y]=rc(t),idx=hit(x,y);
    if(idx<0)continue;
    tMap.set(t.identifier,idx);
    tOff.set(t.identifier,{dx:x-pieces[idx].x,dy:y-pieces[idx].y});
    front(idx);
  }
},{passive:false});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const idx=tMap.get(t.identifier);
    if(idx===undefined)continue;
    const[x,y]=rc(t),off=tOff.get(t.identifier);
    pieces[idx].x=x-off.dx; pieces[idx].y=y-off.dy;
  }
},{passive:false});

cv.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const idx=tMap.get(t.identifier);
    if(idx!==undefined)snap(idx);
    tMap.delete(t.identifier); tOff.delete(t.identifier);
  }
},{passive:false});

cv.addEventListener('touchcancel',e=>{
  for(const t of e.changedTouches){tMap.delete(t.identifier);tOff.delete(t.identifier);}
},{passive:false});

let mdn=false,midx=-1,moff={};
cv.addEventListener('mousedown',e=>{
  if(!alive)return;
  const[x,y]=rc(e); midx=hit(x,y);
  if(midx<0)return; mdn=true;
  moff={dx:x-pieces[midx].x,dy:y-pieces[midx].y};
  front(midx);
});
window.addEventListener('mousemove',e=>{
  if(!mdn||midx<0)return;
  const[x,y]=rc(e);
  pieces[midx].x=x-moff.dx; pieces[midx].y=y-moff.dy;
});
window.addEventListener('mouseup',()=>{
  if(mdn&&midx>=0)snap(midx);
  mdn=false; midx=-1;
});

function front(i){
  const mx=Math.max(...pieces.map(p=>p.z));
  pieces[i].z=mx+1;
}

// ════════════════════════════════════════════
//  SNAP
// ════════════════════════════════════════════
function snap(i){
  const p=pieces[i], tp=tgt(p.c,p.r);
  if(Math.hypot(p.x-tp.x,p.y-tp.y)<snapR){
    p.x=tp.x; p.y=tp.y; p.snapped=true; p._flash=0.7;
    snapped++;
    document.getElementById('prog').textContent=`${snapped} / ${N}`;
    if(snapped>=N)win();
  }
}

// ════════════════════════════════════════════
//  TIMER
// ════════════════════════════════════════════
function tickDisp(){
  const el=document.getElementById('timer');
  el.textContent=`${String(Math.floor(tLeft/60)).padStart(2,'0')}:${String(tLeft%60).padStart(2,'0')}`;
  el.className=tLeft<=30?'red':'';
}

// ════════════════════════════════════════════
//  GAME FLOW
// ════════════════════════════════════════════
function startGame(){
  if(!uploadedImg)return;
  document.getElementById('start').style.display='none';
  document.getElementById('game').classList.add('on');
  layout();
  logo=buildLogoCanvas(Math.round(pW*COLS*1.6), Math.round(pH*ROWS*1.6));
  document.getElementById('hudtitle').textContent=
    gameMode==='inside'?'🧩 Kiểu 2 · Trong':'🧩 Kiểu 1 · Ngoài';
  initPieces();
  gameMode==='inside' ? scatterInside() : scatter();
  snapped=0; tLeft=SECS; alive=true;
  showHints=false; document.getElementById('hint-btn').classList.remove('on');
  document.getElementById('prog').textContent='0 / '+N;
  tickDisp();
  ticker=setInterval(()=>{tLeft--;tickDisp();if(tLeft<=0)lose();},1000);
  render();
}

function win(){
  alive=false; clearInterval(ticker); cancelAnimationFrame(raf);
  const el=SECS-tLeft;
  document.getElementById('win-time').textContent=
    `⏱ ${String(Math.floor(el/60)).padStart(2,'0')}:${String(el%60).padStart(2,'0')}`;
  document.getElementById('ov-win').classList.remove('hide');
}

function lose(){
  alive=false; clearInterval(ticker); cancelAnimationFrame(raf);
  document.getElementById('lose-msg').textContent=`Đã xếp được ${snapped} / ${N} mảnh`;
  document.getElementById('ov-lose').classList.remove('hide');
}

function reset(){
  alive=false; clearInterval(ticker); cancelAnimationFrame(raf);
  tMap.clear(); tOff.clear();
  document.getElementById('ov-win').classList.add('hide');
  document.getElementById('ov-lose').classList.add('hide');
  document.getElementById('game').classList.remove('on');
  document.getElementById('start').style.display='flex';
  // Keep uploaded image — player can replay or tap to change
}

window.addEventListener('resize',()=>{
  if(!alive)return;
  layout();
  pieces.forEach(p=>{if(p.snapped){const tp=tgt(p.c,p.r);p.x=tp.x;p.y=tp.y;}});
});
</script>
